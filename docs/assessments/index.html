<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心理測評中心 - 南風心理輔導室</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <style>
        /* 測評中心專用樣式 */
        .assessments-hero {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            padding: 6rem 2rem 4rem;
            text-align: center;
        }
        
        .assessments-hero h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        
        .assessments-hero p {
            font-size: 1.1rem;
            opacity: 0.9;
            max-width: 600px;
            margin: 0 auto;
        }
        
        /* 測評卡片網格 */
        .assessments-grid {
            max-width: 1200px;
            margin: -2rem auto 4rem;
            padding: 0 2rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
        }
        
        .assessment-card {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .assessment-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
        }
        
        .assessment-card.popular::before {
            content: '熱門';
            position: absolute;
            top: 1rem;
            right: -2rem;
            background: linear-gradient(135deg, #F59E0B, #F97316);
            color: white;
            padding: 0.25rem 2.5rem;
            font-size: 0.75rem;
            font-weight: 600;
            transform: rotate(45deg);
        }
        
        .assessment-icon {
            width: 60px;
            height: 60px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.75rem;
            margin-bottom: 1rem;
        }
        
        .assessment-card h3 {
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
            color: var(--text);
        }
        
        .assessment-card p {
            color: var(--text-light);
            font-size: 0.95rem;
            margin-bottom: 1rem;
        }
        
        .assessment-meta {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            color: var(--text-light);
        }
        
        .assessment-meta span {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }
        
        .start-btn {
            width: 100%;
            padding: 0.875rem;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .start-btn:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }
        
        /* 分類標籤 */
        .category-filter {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }
        
        .category-tag {
            padding: 0.5rem 1rem;
            border-radius: 50px;
            border: 2px solid var(--primary);
            background: transparent;
            color: var(--primary);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .category-tag:hover,
        .category-tag.active {
            background: var(--primary);
            color: white;
        }
        
        /* 特色說明 */
        .features-section {
            background: var(--secondary);
            padding: 4rem 2rem;
        }
        
        .features-grid {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
        }
        
        .feature-item {
            text-align: center;
            padding: 2rem;
        }
        
        .feature-item .icon {
            width: 70px;
            height: 70px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 1.75rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        
        .feature-item h3 {
            margin-bottom: 0.75rem;
        }
        
        .feature-item p {
            color: var(--text-light);
            font-size: 0.95rem;
        }
        
        /* 響應式 */
        @media (max-width: 768px) {
            .assessments-grid {
                grid-template-columns: 1fr;
            }
            
            .features-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <nav>
            <div class="logo">
                <div class="logo-icon">南</div>
                <span>南風心理輔導室</span>
            </div>
            <ul class="nav-links">
                <li><a href="../index.html">首頁</a></li>
                <li><a href="index.html">心理測評</a></li>
                <li><a href="../index.html#counselors">輔導員</a></li>
                <li><a href="../index.html#booking">預約</a></li>
            </ul>
            <a href="../index.html#booking" class="cta-btn">立即預約</a>
        </nav>
    </header>

    <!-- Hero -->
    <section class="assessments-hero">
        <div class="container">
            <h1>心理測評中心</h1>
            <p>專業心理測評工具，幫助你更了解自己的心理健康狀態。<br>所有測評免費，僅需3-5分鐘即可獲得專業評估報告。</p>
        </div>
    </section>

    <!-- 分類篩選 -->
    <div class="category-filter">
        <button class="category-tag active" data-category="all">全部</button>
        <button class="category-tag" data-category="情緒健康">情緒健康</button>
        <button class="category-tag" data-category="職場健康">職場健康</button>
        <button class="category-tag" data-category="人際關係">人際關係</button>
        <button class="category-tag" data-category="性格測試">性格測試</button>
    </div>

    <!-- 測評列表 -->
    <section class="assessments-grid" id="assessmentsGrid">
        <!-- 動態填充 -->
    </section>

    <!-- 特色說明 -->
    <section class="features-section">
        <div class="features-grid">
            <div class="feature-item">
                <div class="icon">🔬</div>
                <h3>科學專業</h3>
                <p>採用國際認可的標準化量表，確保測評結果的準確性和可靠性。</p>
            </div>
            <div class="feature-item">
                <div class="icon">🔒</div>
                <h3>隱私保護</h3>
                <p>測評結果僅保存在你的設備中，不會上傳到任何服務器。</p>
            </div>
            <div class="feature-item">
                <div class="icon">💡</div>
                <h3>專業建議</h3>
                <p>根據測評結果提供個性化建議，幫助你改善心理健康。</p>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="footer-bottom">
            <p>&copy; 2026 南風心理輔導室 Southwind Counselling. 保留所有權利。</p>
        </div>
    </footer>

    <script src="assessments-data.js"></script>
    <script>
        // 渲染測評卡片
        function renderAssessments(category = 'all') {
            const grid = document.getElementById('assessmentsGrid');
            let filtered = assessmentsList;
            
            if (category !== 'all') {
                filtered = assessmentsList.filter(a => a.category === category);
            }
            
            grid.innerHTML = filtered.map(assessment => `
                <div class="assessment-card ${assessment.popular ? 'popular' : ''}" data-category="${assessment.category}">
                    <div class="assessment-icon" style="background: ${assessment.color}20; color: ${assessment.color}">
                        ${assessment.icon}
                    </div>
                    <h3>${assessment.title}</h3>
                    <p>${assessment.desc}</p>
                    <div class="assessment-meta">
                        <span>📝 ${assessment.questions}題</span>
                        <span>⏱️ ${assessment.duration}</span>
                    </div>
                    <a href="assessment.html?id=${assessment.id}" class="start-btn" style="background: ${assessment.color}">
                        開始測評
                    </a>
                </div>
            `).join('');
        }
        
        // 分類篩選
        document.querySelectorAll('.category-tag').forEach(tag => {
            tag.addEventListener('click', () => {
                document.querySelectorAll('.category-tag').forEach(t => t.classList.remove('active'));
                tag.classList.add('active');
                renderAssessments(tag.dataset.category);
            });
        });
        
        // 初始化
        renderAssessments();
    </script>
</body>
</html>
