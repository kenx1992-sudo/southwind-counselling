<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>感謝你的查詢 - 南風心理輔導</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2D5A4A;
            --primary-light: #4A7C6F;
            --success: #10B981;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Noto Sans TC', -apple-system, sans-serif;
            background: linear-gradient(135deg, var(--primary), #1E3A2F);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        
        .card {
            background: white;
            border-radius: 24px;
            padding: 3rem;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.25);
        }
        
        .icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--success), #059669);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2.5rem;
        }
        
        h1 {
            font-size: 1.75rem;
            margin-bottom: 1rem;
            color: #1F2937;
        }
        
        p {
            color: #6B7280;
            margin-bottom: 2rem;
            line-height: 1.7;
        }
        
        .next-steps {
            background: #F8F6F3;
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            text-align: left;
        }
        
        .next-steps h3 {
            font-size: 1rem;
            margin-bottom: 1rem;
            color: #1F2937;
        }
        
        .step {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
            color: #6B7280;
            font-size: 0.95rem;
        }
        
        .step-number {
            width: 24px;
            height: 24px;
            background: var(--primary);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 600;
            flex-shrink: 0;
        }
        
        .btn {
            display: inline-block;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            padding: 1rem 2rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            margin: 0.5rem;
        }
        
        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">✓</div>
        <h1>感謝你的查詢！</h1>
        <p>我們已收到你的消息，會在 24 小時內通過你提供的聯絡方式回覆你。</p>
        
        <div class="next-steps">
            <h3>📋 接下來：</h3>
            <div class="step">
                <span class="step-number">1</span>
                <span>我們的團隊會審查你的查詢</span>
            </div>
            <div class="step">
                <span class="step-number">2</span>
                <span>為你匹配最適合的服務方案</span>
            </div>
            <div class="step">
                <span class="step-number">3</span>
                <span>通過 Telegram/WhatsApp/郵件回覆你</span>
            </div>
        </div>
        
        <a href="index.html" class="btn">返回首頁</a>
        <a href="https://t.me/Szechunbot" class="btn btn-outline">聯絡 @Szechunbot</a>
    </div>
</body>
</html>
