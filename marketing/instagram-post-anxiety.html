<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background: #f0f0f0;
            font-family: 'Noto Sans TC', sans-serif;
        }
        .post {
            width: 1080px;
            height: 1080px;
            background: linear-gradient(135deg, #2D5A4A 0%, #1E3A2F 100%);
            display: flex;
            flex-direction: column;
            padding: 80px;
            position: relative;
            overflow: hidden;
        }
        .post::after {
            content: '';
            position: absolute;
            top: -50%;
            right: -30%;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(232,184,109,0.1) 0%, transparent 60%);
            border-radius: 50%;
        }
        .badge {
            background: rgba(255,255,255,0.15);
            color: #E8B86D;
            padding: 12px 32px;
            border-radius: 50px;
            font-size: 24px;
            font-weight: 700;
            display: inline-block;
            margin-bottom: 40px;
            align-self: flex-start;
            border: 2px solid rgba(232,184,109,0.3);
        }
        .title {
            font-size: 64px;
            font-weight: 700;
            color: white;
            margin-bottom: 20px;
            line-height: 1.3;
        }
        .subtitle {
            font-size: 28px;
            color: rgba(255,255,255,0.7);
            margin-bottom: 50px;
        }
        .tips-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .tip-item {
            display: flex;
            align-items: center;
            gap: 24px;
            background: rgba(255,255,255,0.08);
            padding: 24px 32px;
            border-radius: 16px;
            border-left: 4px solid #E8B86D;
        }
        .tip-number {
            width: 50px;
            height: 50px;
            background: #E8B86D;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1E3A2F;
            font-size: 24px;
            font-weight: 700;
            flex-shrink: 0;
        }
        .tip-text {
            font-size: 28px;
            color: white;
            font-weight: 400;
        }
        .footer {
            margin-top: auto;
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-size: 22px;
            padding-top: 40px;
        }
    </style>
</head>
<body>
    <div class="post">
        <div class="badge">心理健康小知識</div>
        
        <h1 class="title">焦慮症的5個早期訊號</h1>
        <p class="subtitle">認識這些訊號，及早關注自己的心理健康</p>
        
        <div class="tips-list">
            <div class="tip-item">
                <div class="tip-number">1</div>
                <div class="tip-text">持續的緊張感，無法放鬆</div>
            </div>
            
            <div class="tip-item">
                <div class="tip-number">2</div>
                <div class="tip-text">睡眠問題（難入睡或早醒）</div>
            </div>
            
            <div class="tip-item">
                <div class="tip-number">3</div>
                <div class="tip-text">難以集中注意力，容易分心</div>
            </div>
            
            <div class="tip-item">
                <div class="tip-number">4</div>
                <div class="tip-text">身體不適（頭痛、肌肉緊繃）</div>
            </div>
            
            <div class="tip-item">
                <div class="tip-number">5</div>
                <div class="tip-text">過度擔心，難以控制的思緒</div>
            </div>
        </div>
        
        <div class="footer">💚 如果持續出現，建議尋求專業協助｜@southwind_counseling</div>
    </div>
</body>
</html>
