<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background: #f0f0f0;
            font-family: 'Noto Sans TC', sans-serif;
        }
        .post {
            width: 1080px;
            height: 1080px;
            background: linear-gradient(180deg, #F8F6F3 0%, #E8F4F0 100%);
            display: flex;
            flex-direction: column;
            padding: 80px;
            position: relative;
            overflow: hidden;
        }
        .post::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 8px;
            background: linear-gradient(90deg, #2D5A4A, #4A7C6F);
        }
        .badge {
            background: #2D5A4A;
            color: white;
            padding: 12px 32px;
            border-radius: 50px;
            font-size: 24px;
            font-weight: 700;
            display: inline-block;
            margin-bottom: 50px;
            align-self: flex-start;
        }
        .title {
            font-size: 72px;
            font-weight: 700;
            color: #1F2937;
            margin-bottom: 60px;
            line-height: 1.3;
        }
        .counselors {
            display: flex;
            gap: 40px;
            margin-bottom: 60px;
        }
        .counselor {
            flex: 1;
            text-align: center;
            background: white;
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        .counselor-avatar {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #2D5A4A, #4A7C6F);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 48px;
            font-weight: 700;
        }
        .counselor-name {
            font-size: 28px;
            font-weight: 700;
            color: #1F2937;
            margin-bottom: 8px;
        }
        .counselor-title {
            font-size: 20px;
            color: #6B7280;
        }
        .cta {
            background: linear-gradient(135deg, #2D5A4A, #4A7C6F);
            color: white;
            padding: 30px 60px;
            border-radius: 16px;
            font-size: 32px;
            font-weight: 700;
            text-align: center;
            margin-top: auto;
        }
        .handle {
            position: absolute;
            bottom: 40px;
            right: 40px;
            color: #9CA3AF;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div class="post">
        <div class="badge">認識我們的團隊</div>
        
        <h1 class="title">專業輔導員<br>陪伴你的每一步</h1>
        
        <div class="counselors">
            <div class="counselor">
                <div class="counselor-avatar">陳</div>
                <div class="counselor-name">陳雅婷博士</div>
                <div class="counselor-title">臨床心理學家<br>12年經驗</div>
            </div>
            
            <div class="counselor">
                <div class="counselor-avatar">李</div>
                <div class="counselor-name">李志偉先生</div>
                <div class="counselor-title">輔導心理學家<br>8年經驗</div>
            </div>
            
            <div class="counselor">
                <div class="counselor-avatar">王</div>
                <div class="counselor-name">王美琪女士</div>
                <div class="counselor-title">註冊社工<br>10年經驗</div>
            </div>
        </div>
        
        <div class="cta">👇 預約諮詢了解更多</div>
        
        <div class="handle">@southwind_counseling</div>
    </div>
</body>
</html>
